<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="TAYTA">
  <!-- Insignia -->
  <circle cx="60" cy="60" r="57" fill="#ffffff" stroke="#1e293b" stroke-width="4"/>
  <!-- Cabello blanco a los lados -->
  <ellipse cx="37" cy="66" rx="14" ry="21" fill="#e5e7eb"/>
  <ellipse cx="83" cy="66" rx="14" ry="21" fill="#e5e7eb"/>
  <!-- Rostro -->
  <ellipse cx="60" cy="62" rx="30" ry="35" fill="#f3c9a8"/>
  <!-- Brillo de la calva -->
  <path d="M38 46 Q60 30 82 46 Q60 40 38 46 Z" fill="#f8d9bf"/>
  <!-- Orejas -->
  <circle cx="31" cy="65" r="6" fill="#efba93"/>
  <circle cx="89" cy="65" r="6" fill="#efba93"/>
  <!-- Arrugas de la frente -->
  <path d="M47 47 q13 -5 26 0" stroke="#dba883" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M50 52 q10 -4 20 0" stroke="#dba883" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cejas -->
  <path d="M43 59 q5 -3 11 0" stroke="#cbd5e1" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M66 59 q5 -3 11 0" stroke="#cbd5e1" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Ojo izquierdo (abierto) y derecho (guiño) -->
  <circle cx="50" cy="65" r="2.8" fill="#3b2a20"/>
  <path d="M66 65 q5.5 -4 11 0" stroke="#3b2a20" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- Nariz -->
  <path d="M59 67 q-3 8 1 12" stroke="#dba883" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- Sonrisa con boca abierta -->
  <path d="M49 83 q11 13 22 0 q-11 5 -22 0 Z" fill="#c0392b"/>
  <path d="M52 84 q8 3 16 0" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
