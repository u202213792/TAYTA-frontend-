<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 170" role="img" aria-label="Cuidado del adulto mayor">
  <defs>
    <clipPath id="r"><rect x="0" y="0" width="260" height="170" rx="16"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <!-- destellos decorativos -->
    <circle cx="40" cy="30" r="46" fill="rgba(255,255,255,0.10)"/>
    <circle cx="225" cy="135" r="55" fill="rgba(255,255,255,0.08)"/>

    <!-- ===== Adulto mayor (izquierda) ===== -->
    <g transform="translate(60,40)">
      <!-- cuerpo -->
      <path d="M-26 96 Q-26 50 0 50 Q26 50 26 96 Z" fill="#f59e0b"/>
      <!-- cuello -->
      <rect x="-9" y="38" width="18" height="20" rx="8" fill="#f3c9a8"/>
      <!-- cabeza -->
      <circle cx="0" cy="22" r="24" fill="#f3c9a8"/>
      <!-- cabello cano -->
      <path d="M-24 18 Q-24 -8 0 -8 Q24 -8 24 18 Q14 6 0 6 Q-14 6 -24 18 Z" fill="#e5e7eb"/>
      <!-- lentes -->
      <circle cx="-9" cy="22" r="6" fill="none" stroke="#475569" stroke-width="2"/>
      <circle cx="9" cy="22" r="6" fill="none" stroke="#475569" stroke-width="2"/>
      <line x1="-3" y1="22" x2="3" y2="22" stroke="#475569" stroke-width="2"/>
      <!-- sonrisa -->
      <path d="M-7 32 q7 6 14 0" stroke="#b45309" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>

    <!-- ===== Cuidadora (derecha) ===== -->
    <g transform="translate(150,30)">
      <!-- cuerpo -->
      <path d="M-30 106 Q-30 56 0 56 Q30 56 30 106 Z" fill="#0d9488"/>
      <!-- cuello -->
      <rect x="-9" y="42" width="18" height="22" rx="8" fill="#f7d9bd"/>
      <!-- cabeza -->
      <circle cx="0" cy="24" r="26" fill="#f7d9bd"/>
      <!-- cabello -->
      <path d="M-26 22 Q-28 -6 0 -6 Q28 -6 26 22 Q26 6 18 4 L18 30 Q24 14 24 8 Q10 0 0 0 Q-10 0 -24 8 Q-24 16 -18 30 L-18 4 Q-26 6 -26 22 Z" fill="#7c3933"/>
      <!-- sonrisa -->
      <path d="M-7 30 q7 6 14 0" stroke="#b45309" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- ojos -->
      <circle cx="-8" cy="22" r="2" fill="#3b2a20"/>
      <circle cx="8" cy="22" r="2" fill="#3b2a20"/>
    </g>

    <!-- corazón entre ambos -->
    <path d="M120 58 q-7 -8 -14 -2 q-6 6 0 13 q5 6 14 12 q9 -6 14 -12 q6 -7 0 -13 q-7 -6 -14 2 Z" fill="#fb7185"/>
  </g>
</svg>
